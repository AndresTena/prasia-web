<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviso Legal — Prasia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #1E3A5F; --gold: #D4AF37; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .header {
      background: var(--navy);
      padding: 28px 0;
      text-align: center;
    }
    .header a {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      text-decoration: none;
      letter-spacing: -0.04em;
    }
    .header a span { color: var(--gold); }
    .content {
      max-width: 720px;
      margin: 64px auto;
      padding: 0 28px 80px;
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.03em; }
    p  { color: #718096; font-size: 0.95rem; line-height: 1.7; margin-top: 16px; }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 40px;
      color: var(--navy);
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html"><span>P</span>rasia</a>
